<IfModule mod_deflate.c>
    # Comprimir HTML, CSS, JavaScript, Texto y XML
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
    AddOutputFilterByType DEFLATE application/javascript application/json application/xml

    # Excluir archivos que ya están comprimidos (imágenes, videos, archivos)
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|avi|mp4|zip|rar|gz)$ no-gzip dont-vary
</IfModule>
